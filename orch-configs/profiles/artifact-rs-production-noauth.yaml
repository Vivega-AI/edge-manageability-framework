# Define where to pull charts and containers.
# Each cluster need to specify one and only one artifact-* profile.
argo:
  releaseService:
    ociRegistry: "registry-rs.harbor.vivegaai.com:9443"
    fileServer: "files-rs.edgeorchestration.intel.com"
    caCert: ""
  tokenRefresh: null
  chartRepoURL: "registry-rs.harbor.vivegaai.com:9443/edge-orch"
  rsChartRepoURL: "registry-rs.harbor.vivegaai.com:9443/edge-orch"
  containerRegistryURL: "registry-rs.harbor.vivegaai.com:9443/edge-orch"
