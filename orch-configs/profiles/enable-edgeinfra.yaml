# Includes Edge Infrastructure Manager and UI
# Tuned for: single-node 32GB, 20 edge devices

argo:
  enabled:
    infra-core: true
    infra-managers: true
    infra-external: true
    infra-onboarding: true
    web-ui-infra: true
    copy-keycloak-admin-to-infra: true
  infra-core:
    tenant-config:
      enabled: false
    api:
      resources:
        requests:
          memory: "64Mi"
          cpu: "10m"
        limits:
          memory: "512Mi"
          cpu: "1"
    exporter:
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "256Mi"
          cpu: "500m"
    inventory:
      resources:
        requests:
          memory: "64Mi"
          cpu: "10m"
        limits:
          memory: "512Mi"
          cpu: "1"
    tenant-controller:
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "256Mi"
          cpu: "500m"
  infra-managers:
    host-manager:
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "256Mi"
          cpu: "500m"
    maintenance-manager:
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "256Mi"
          cpu: "500m"
    telemetry-manager:
      resources:
        requests:
          memory: "64Mi"
          cpu: "10m"
        limits:
          memory: "512Mi"
          cpu: "1"
    os-resource-manager:
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "256Mi"
          cpu: "500m"
    networking-manager:
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "256Mi"
          cpu: "500m"
  infra-onboarding:
    onboarding-manager:
      enabled: true
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "256Mi"
          cpu: "500m"
    dkam:
      resources:
        requests:
          memory: "64Mi"
          cpu: "10m"
        limits:
          memory: "512Mi"
          cpu: "1"
    pxe-server:
      enabled: false
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "256Mi"
          cpu: "500m"
  infra-external: {}
