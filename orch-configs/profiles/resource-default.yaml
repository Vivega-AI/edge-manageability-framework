# resource-default.yaml
# Tuned for: single-node on-prem, ~80GB RAM, full stack, single tenancy
# Changes from original:
#   - requests: kept minimal (1m cpu, realistic memory) for scheduler signal
#   - limits: reduced from unlimited 64Gi to realistic per-service caps
#   - Istio proxy sidecar: kept very lean (injected into every pod)
#   - O11y (Mimir/Loki): biggest consumers, given generous but bounded limits
#   - Platform services (Keycloak, Vault, PostgreSQL): medium limits
#   - UI / small controllers: small limits

