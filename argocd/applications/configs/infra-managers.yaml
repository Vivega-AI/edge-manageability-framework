    addr: inventory.orch-infra.svc.cluster.local
  image:
    pullPolicy: IfNotPresent
  serviceArgs:
    traceURL: "orchestrator-observability-opentelemetry-collector.orch-platform.svc:4318"
  traefikReverseProxy:
    enabled: true
    secretName: "tls-orch"
    tlsOption: "gateway-tls"
  oidc:
